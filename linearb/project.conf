#!/bin/bash
# =============================================================================
# project.conf — Project-specific settings for the Ralph Wiggum Loop
#
# This file is sourced by run-ralph.sh and preflight.sh.
# Everything project-specific lives here; the loop scripts are generic.
# =============================================================================

# ── Load .env if present ─────────────────────────────────────────────────────
if [[ -f "${SCRIPT_DIR:-.}/.env" ]]; then
    set -a
    source "${SCRIPT_DIR:-.}/.env"
    set +a
fi

# ── Identity ─────────────────────────────────────────────────────────────────
PROJECT_NAME="DORA Metrics Dashboard"

# ── Environment requirements ─────────────────────────────────────────────────
# Required CLI tools (checked by preflight)
REQUIRED_TOOLS=("claude" "node" "python3" "git")

# Required environment variables (checked by preflight)
REQUIRED_ENV_VARS=("GITHUB_TOKEN" "JIRA_EMAIL" "JIRA_API_TOKEN")

# Optional environment variable (warn if missing)
OPTIONAL_ENV_VARS=("ANTHROPIC_API_KEY")

# ── Network ──────────────────────────────────────────────────────────────────
PORT=3001

# ── Process management ───────────────────────────────────────────────────────
# Pattern used to kill lingering server processes between iterations
KILL_PATTERN="node server.js"

# ── Planning ────────────────────────────────────────────────────────────────
# Plan quality gates — validation runs after every planner invocation
MIN_PLAN_TASKS=10               # Reject plans with fewer tasks (too coarse)
MAX_PLAN_TASKS=60               # Reject plans with more tasks (too granular)
MAX_PLAN_ATTEMPTS=3             # Give up after this many failed plan generations
PLAN_REVIEW_MODEL="opus"        # Model for the plan reviewer
PLAN_REVIEW_MAX_TURNS=30        # Max turns for plan review agent

# ── Replanning triggers ─────────────────────────────────────────────────────
# Replan when stuck (PLAN.md unchanged) for this many iterations
REPLAN_ON_STUCK=true
# Replan when reviewer writes [REPLAN] in REVIEW.md
REPLAN_ON_REVIEW=true
# Manual trigger: touch .ralph-replan to force a replan next iteration
REPLAN_MANUAL_FILE=".ralph-replan"

# ── Directory structure ──────────────────────────────────────────────────────
# Directories to create at startup (beyond the defaults: logs, runs)
PROJECT_DIRS=("data" "public" "config" "screenshots")

# ── Setup commands ───────────────────────────────────────────────────────────
# Run once at loop start (e.g., venv creation, dependency install)
setup_project() {
    if [[ ! -d .venv ]]; then
        echo "  Creating Python venv..."
        python3 -m venv .venv
        echo "  ✓ .venv created"
    fi
}

# ── Generated files ──────────────────────────────────────────────────────────
# Files created by the builder that should be cleaned on preflight reset
GENERATED_CODE=("server.js" "fetch-github.py" "fetch-jira.py" "package.json" "package-lock.json")
GENERATED_DATA=("data/github_prs.json" "data/jira_incidents.json")
GENERATED_DIRS=("node_modules" ".venv")
GENERATED_SPECS=("specs/REVIEW.md" "specs/PLAN.md" "specs/PLAN_REVIEW.md" "specs/TEST_RESULTS.md")

# Directories whose contents are wiped on clean (but the dirs themselves stay)
RUNTIME_DIRS=("logs" "screenshots")

# ── Archive manifest ─────────────────────────────────────────────────────────
# Build output: copied to runs/{name}/output/
ARCHIVE_FILES=("fetch-github.py" "fetch-jira.py" "server.js" "package.json")
ARCHIVE_DIRS=("public" "data" "config")

# ── Git ignore entries ────────────────────────────────────────────────────────
# Used by preflight.sh when initializing a new git repo
GITIGNORE_ENTRIES=(
    ".env"
    "node_modules/"
    ".venv/"
    "data/"
    "logs/"
    "screenshots/"
    "runs/"
    ".ralph-iteration"
    "__pycache__/"
    "*.pyc"
    "package-lock.json"
    "server.log"
)

# ── Preflight: extra checks ─────────────────────────────────────────────────
# Project-specific preflight validations (called by preflight.sh)
preflight_project_checks() {
    # Check repo config
    if [[ -f "${SCRIPT_DIR}/config/repos.json" ]]; then
        ORG_NAME=$(python3 -c "import json; print(json.load(open('${SCRIPT_DIR}/config/repos.json'))['github_org'])" 2>/dev/null || echo "?")
        check_pass "config/repos.json (org: ${ORG_NAME})"
    else
        check_fail "config/repos.json missing"
    fi

    # Check goals config
    if [[ -f "${SCRIPT_DIR}/config/goals.json" ]]; then
        check_pass "config/goals.json"
    else
        check_fail "config/goals.json missing"
    fi
}

# ── Preflight: STATUS.md reset template ──────────────────────────────────────
# Written to specs/STATUS.md when cleaning for a fresh run
read -r -d '' STATUS_TEMPLATE << 'STATUSEOF' || true
# Status

Iteration: 0
Last updated: (not started)

## What happened last iteration

Nothing yet — fresh run.

## Known issues

None.
STATUSEOF

# ── Preflight: AGENTS.md reset template ──────────────────────────────────────
# Written to specs/AGENTS.md when cleaning for a fresh run
read -r -d '' AGENTS_TEMPLATE << 'AGENTSEOF' || true
# Operational Learnings

## Environment

- Python venv is at `.venv/` — always use `.venv/bin/python3` and `.venv/bin/pip`
- Server runs on port **3001** (not 3000 — that's ralph-trends)
- Environment variables required: `GITHUB_TOKEN`, `JIRA_EMAIL`, `JIRA_API_TOKEN`

## API Notes

(populated during iteration as the builder discovers API quirks)

## Known Issues

- None yet — fresh run
AGENTSEOF
